<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Document</title>
</head>
<body>
             <script>
    var nome = 'diego augusto'

    document.write('Original: ' + nome + '<br>')
    document.write('Maiúsculo: ' + nome.toUpperCase() + '<br>')
    document.write('Minúsculo: ' + nome.toLowerCase() + '<br>')
    document.write('Tamanho: ' + nome.length + '<br>')
    document.write('Contém diego? ' + nome.includes('diego') + '<br>')
    document.write('Substituído: ' + nome.replace('diego', 'Diego') + '<br>')
</script>
</body>
</html>
