<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Document</title>
</head>
<body>
                    <script>
         var nome = window.prompt('Qual é o seu nome?')
         var anoNascimento = Number(window.prompt('Qual o seu ano de nascimento?'))
         var anoAtual = 2026
         var idade = anoAtual - anoNascimento

         document.write('Olá, ' + nome + '!<br>')
         document.write('Voce tem aproximadamente ' + idade + 'anos.<br>')
         </script>
</body>
</html>
