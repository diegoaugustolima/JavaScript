<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Document</title>
</head>
<body>
                    <script>
                                        var frutas = ['maçã', 'banana', 'laranja']
                                        document.write('Lista inicial: ' + frutas + '<br>')
                                        frutas.push('uva')
                                        document.write('Depois do push: ' + frutas + '<br>')
                                        frutas.pop()
                                        document.write('Depois do pop: ' + frutas + '<br>')
                                        document.write('Tamanho: ' + frutas.length + '<br>')
                                        document.write('Posição da banana: ' + frutas.indexOf('banana') + '<br>')
                    </script>
</body>
</html>
