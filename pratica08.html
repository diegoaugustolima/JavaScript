<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Document</title>
</head>
<body>
            <script>
                    var numero = Number(window.prompt('Digite um número para ver a tabuada:'))
                    for (var i = 1; i <= 10; i++) {
                                        document.write(numero + ' x ' + i + '= ' + (numero * i) + '<br>')
                    }
            </script>        
</body>
</html>
