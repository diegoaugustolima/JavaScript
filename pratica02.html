<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Document</title>
</head>
<body>
   <script>
                    var n1 = 2000
                    var n2 = 26

                    document.write('soma: ' + (n1 + n2) + '<br>')
                    document.write('subtração: ' + (n1 - n2) + '<br>')
                    document.write('multiplicação: ' + (n1 * n2) + '<br>')
                    document.write('divisão: ' + (n1 / n2) + '<br>')
                    document.write('resto: ' + (n1 % n2) + '<br>')
</script>                 
</body>
