<!DOCTYPE html>
<html lang="en">
<head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Document</title>
</head>
<body>
                    <script>
                                        function somar(n1, n2) {
                                                            return n1 + n2
                                        }
                                        function subtrair(n1, n2) {
                                                            return n1 - n2}
                                        function multiplicar(n1, n2) {
                                                            return n1 * n2}
                                        function dividir(n1, n2) {
                                                            return n1 / n2}
                                                            var a = Number(window.prompt('digite o primeiro número: '))
                                                            var b = Number(window.prompt('Digite o segundo número: '))
                                                            
                                                            document.write('Soma: ' + somar(a, b) + '<br>')
                                                            document.write('Subtração: ' + subtrair(a, b) + '<br>')
                                                            document.write('Multiplicação:' + multiplicar(a, b) + '<br>')
                                                            document.write('Divisão: ' + dividir(a, b) + '<br>')
                    </script>
</body>
</html>
